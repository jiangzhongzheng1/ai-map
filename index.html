<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>AI 概念地图</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --border: #1e1e2e;
    --accent: #e8a838;
    --accent2: #5b8dee;
    --accent3: #52d48f;
    --text: #e2e2f0;
    --muted: #6b6b88;
    --layer1: #1a0f2e;
    --layer2: #0f1a2e;
    --layer3: #0a1f1a;
    --layer4: #1f1a0a;
    --layer5: #1f0a0a;
    --layer6: #0f0a1f;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans SC', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Header */
  .header {
    padding: 28px 20px 16px;
    position: relative;
  }
  .header-label {
    font-family: 'Syne', sans-serif;
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 8px;
    opacity: 0;
    animation: fadeUp 0.6s 0.1s forwards;
  }
  .header h1 {
    font-family: 'Syne', sans-serif;
    font-size: 26px;
    font-weight: 800;
    line-height: 1.2;
    opacity: 0;
    animation: fadeUp 0.6s 0.2s forwards;
  }
  .header h1 span { color: var(--accent); }
  .header-sub {
    font-size: 13px;
    color: var(--muted);
    margin-top: 8px;
    line-height: 1.6;
    opacity: 0;
    animation: fadeUp 0.6s 0.3s forwards;
  }

  /* Intro hint */
  .hint {
    margin: 0 20px 20px;
    padding: 10px 14px;
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent);
    background: rgba(232,168,56,0.05);
    border-radius: 4px;
    font-size: 12px;
    color: var(--muted);
    opacity: 0;
    animation: fadeUp 0.6s 0.4s forwards;
  }

  /* Stack container */
  .stack {
    padding: 0 20px 40px;
  }

  /* Connector line */
  .connector {
    display: flex;
    align-items: center;
    padding: 0 0 0 28px;
    height: 28px;
    opacity: 0;
    animation: fadeIn 0.4s forwards;
  }
  .connector-line {
    width: 2px;
    height: 100%;
    background: linear-gradient(to bottom, var(--c-top), var(--c-bot));
    margin-right: 16px;
    flex-shrink: 0;
  }
  .connector-label {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 1px;
  }

  /* Layer card */
  .layer-card {
    border-radius: 10px;
    border: 1px solid var(--border);
    overflow: hidden;
    cursor: pointer;
    transition: border-color 0.2s, box-shadow 0.2s;
    opacity: 0;
    animation: fadeUp 0.5s forwards;
    position: relative;
  }
  .layer-card:active { transform: scale(0.99); }
  .layer-card.active {
    box-shadow: 0 0 0 1px var(--card-color), 0 4px 24px rgba(0,0,0,0.4);
    border-color: var(--card-color);
  }

  .layer-header {
    display: flex;
    align-items: center;
    padding: 14px 16px;
    background: var(--card-bg);
    position: relative;
    gap: 12px;
  }
  .layer-icon {
    width: 36px;
    height: 36px;
    border-radius: 8px;
    background: var(--card-color);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 17px;
    flex-shrink: 0;
    opacity: 0.9;
  }
  .layer-meta {
    flex: 1;
    min-width: 0;
  }
  .layer-tag {
    font-family: 'Syne', sans-serif;
    font-size: 9px;
    letter-spacing: 2px;
    color: var(--card-color);
    text-transform: uppercase;
    margin-bottom: 2px;
  }
  .layer-title {
    font-size: 15px;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .layer-subtitle {
    font-size: 11px;
    color: var(--muted);
    margin-top: 1px;
  }
  .layer-chevron {
    color: var(--muted);
    font-size: 14px;
    transition: transform 0.3s;
    flex-shrink: 0;
  }
  .layer-card.active .layer-chevron { transform: rotate(180deg); color: var(--card-color); }

  /* Expand panel */
  .layer-body {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.4s cubic-bezier(0.4,0,0.2,1);
    background: var(--card-bg);
  }
  .layer-body.open { max-height: 600px; }
  .layer-body-inner {
    padding: 0 16px 18px;
    border-top: 1px solid var(--border);
  }

  .section-label {
    font-family: 'Syne', sans-serif;
    font-size: 9px;
    letter-spacing: 2px;
    color: var(--card-color);
    text-transform: uppercase;
    margin: 14px 0 6px;
    opacity: 0.7;
  }
  .section-text {
    font-size: 13.5px;
    line-height: 1.75;
    color: #c8c8e0;
  }

  /* Analogy box */
  .analogy-box {
    margin-top: 10px;
    padding: 10px 13px;
    background: rgba(255,255,255,0.03);
    border-radius: 6px;
    border-left: 3px solid var(--card-color);
  }
  .analogy-box .section-label { margin-top: 0; }

  /* Tags row */
  .tags-row {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 10px;
  }
  .tag {
    padding: 3px 9px;
    border-radius: 20px;
    font-size: 11px;
    border: 1px solid var(--card-color);
    color: var(--card-color);
    background: rgba(255,255,255,0.03);
    opacity: 0.8;
  }

  /* Connection note */
  .conn-note {
    margin-top: 12px;
    padding: 8px 12px;
    background: rgba(255,255,255,0.02);
    border-radius: 6px;
    font-size: 12px;
    color: var(--muted);
    line-height: 1.6;
    border: 1px dashed var(--border);
  }
  .conn-note strong { color: var(--card-color); font-weight: 500; }

  /* Glossary section */
  .glossary {
    margin: 8px 20px 20px;
    opacity: 0;
    animation: fadeUp 0.6s 1.4s forwards;
  }
  .glossary-title {
    font-family: 'Syne', sans-serif;
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 12px;
  }
  .glossary-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .gitem {
    padding: 10px 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    cursor: pointer;
    transition: border-color 0.2s;
  }
  .gitem:active { opacity: 0.8; }
  .gitem-term {
    font-family: 'Syne', sans-serif;
    font-size: 12px;
    font-weight: 700;
    color: var(--accent2);
    margin-bottom: 3px;
  }
  .gitem-def {
    font-size: 11px;
    color: var(--muted);
    line-height: 1.5;
  }

  /* Modal */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.8);
    backdrop-filter: blur(4px);
    z-index: 100;
    display: none;
    align-items: flex-end;
    justify-content: center;
    padding: 20px;
  }
  .modal-overlay.show { display: flex; }
  .modal {
    background: #13131e;
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px 20px;
    width: 100%;
    max-width: 420px;
    animation: slideUp 0.3s cubic-bezier(0.4,0,0.2,1);
  }
  .modal-term {
    font-family: 'Syne', sans-serif;
    font-size: 22px;
    font-weight: 800;
    color: var(--accent);
    margin-bottom: 12px;
  }
  .modal-body {
    font-size: 14px;
    line-height: 1.8;
    color: #c8c8e0;
  }
  .modal-close {
    margin-top: 20px;
    width: 100%;
    padding: 12px;
    background: var(--border);
    border: none;
    border-radius: 8px;
    color: var(--text);
    font-size: 14px;
    cursor: pointer;
    font-family: 'Noto Sans SC', sans-serif;
  }

  /* Noise overlay */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.5;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    from { opacity: 0; } to { opacity: 1; }
  }
  @keyframes slideUp {
    from { transform: translateY(30px); opacity: 0; }
    to   { transform: translateY(0); opacity: 1; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-label">概念地图 · AI STACK</div>
  <h1>AI 到底是<span>什么</span>在<span>哪里</span></h1>
  <div class="header-sub">从"一家公司训练了一个模型"到"你在手机上打字"——每一层都很重要</div>
</div>

<div class="hint">👆 点击每一层展开——看它是什么、类比、和上下层的关系</div>

<div class="stack" id="stack"></div>

<div class="glossary">
  <div class="glossary-title">常见词速查</div>
  <div class="glossary-grid" id="glossary-grid"></div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-term" id="modal-term"></div>
    <div class="modal-body" id="modal-body"></div>
    <button class="modal-close" onclick="closeModal()">关闭</button>
  </div>
</div>

<script>
const layers = [
  {
    id: 'company',
    tag: '第一层 · 起点',
    icon: '🏭',
    title: '研究公司',
    subtitle: 'Anthropic · OpenAI · Google DeepMind',
    color: '#a78bfa',
    bg: '#0d0a1a',
    what: '这些公司做一件事：用海量数据和算力"训练"出一个模型。训练完成后，模型就是一个巨大的文件，存在服务器里。',
    analogy: '就像一个出版社——它负责写书、印书。书（模型）印出来之后，出版社可以直接卖给读者，也可以批发给书店再卖。',
    tags: ['Anthropic', 'OpenAI', 'Google', 'Meta', 'Mistral'],
    conn: '训练好的模型会向下开放两种入口：<strong>API</strong>（给开发者）和<strong>自己的产品</strong>（给普通用户）'
  },
  {
    id: 'model',
    tag: '第二层 · 核心',
    icon: '🧠',
    title: '模型 / 大模型 / LLM',
    subtitle: '这才是真正意义上的"AI"',
    color: '#e8a838',
    bg: '#13100a',
    what: '一个超大的数学函数。给它文字输入，它输出文字。它"懂"语言、"会"推理，是因为训练时看过极其海量的人类文字。本质是一个超复杂的"下一个词预测机器"，被优化到极致。',
    analogy: '就像一个经历了极度密集训练的大脑——它没有"记忆"，每次对话对它来说都是全新的，但它有深厚的"理解能力"。',
    tags: ['Claude Sonnet', 'GPT-4o', 'Gemini', 'LLaMA', 'DeepSeek'],
    conn: '同一个模型可以同时被<strong>API调用</strong>（开发者）和<strong>官方产品</strong>（普通用户）访问——本质上是同一个大脑'
  },
  {
    id: 'api',
    tag: '第三层 · 接口',
    icon: '🔌',
    title: 'API',
    subtitle: '程序员调用模型的"门"',
    color: '#5b8dee',
    bg: '#0a0f1a',
    what: '一个标准化的接口——开发者写代码，把问题"发"进去，答案"出"来。用API就不需要自己训练模型，直接租用别人训练好的大脑。按使用量付费。',
    analogy: '就像电力插座——你不需要自己建发电厂，直接插上就有电用。API就是"AI电力"的插座。',
    tags: ['HTTP请求', 'Token计费', 'Claude API', 'OpenAI API', '密钥认证'],
    conn: '一个公司的APP可以同时调用多个API（多个"插座"），用户完全感知不到背后用的哪个模型'
  },
  {
    id: 'product',
    tag: '第四层 · 产品',
    icon: '💬',
    title: '网页/App产品（2C）',
    subtitle: 'claude.ai · ChatGPT · Gemini App',
    color: '#52d48f',
    bg: '#0a140f',
    what: '把API包装成普通人能直接用的界面。你在 claude.ai 打字，本质上是在通过一个漂亮的前端触达背后的模型。这类产品面向个人用户，叫2C（To Consumer）。',
    analogy: '就像星巴克——咖啡豆（模型）是别人的，星巴克提供了场所、杯子、气氛，让你舒服地喝到咖啡。',
    tags: ['claude.ai', 'ChatGPT.com', 'Gemini', 'Copilot', '月订阅'],
    conn: '同一个模型，除了做自己的2C产品，还可以把API开放给企业——企业做<strong>2B产品</strong>，再卖给自己的用户'
  },
  {
    id: 'agent',
    tag: '第五层 · 进化',
    icon: '⚡',
    title: 'Agent（智能体）',
    subtitle: '不只是"回答"，还能"行动"',
    color: '#f97316',
    bg: '#140a02',
    what: '普通AI是"你问我答"。Agent是AI主动制定计划、调用工具（搜索、写代码、操作文件、发邮件……）、多步骤执行任务，直到目标完成。这是AI能力的质变，不是量变。',
    analogy: '问路 vs 有人帮你开车去目的地。前者是聊天AI，后者是Agent——它会自己查地图、预判堵车、绕路、停车。',
    tags: ['多步骤执行', '工具调用', '自主规划', 'Claude Code', 'AutoGPT'],
    conn: 'Agent建立在模型和API之上，但加入了<strong>"循环执行"</strong>逻辑——它可以把一个大任务拆成几十步自己完成'
  },
  {
    id: 'users',
    tag: '第六层 · 使用',
    icon: '👥',
    title: '2B vs 2C 用户',
    subtitle: '谁在用，怎么用',
    color: '#ec4899',
    bg: '#140a10',
    what: '2C（To Consumer）：直接卖给个人——你我这样的普通用户，订阅制或免费。\n\n2B（To Business）：卖给企业——企业接入API，把AI能力嵌进自己的产品或流程，再服务他们的客户或员工。企业通常按API用量付费，规模大很多。',
    analogy: '2C是零售，2B是批发。同一个"面粉厂"（模型），有人直接买小袋面粉回家做饼（2C），有人买一吨面粉开面包店（2B）。',
    tags: ['个人订阅', '企业API合同', '内部工具', '客服机器人', '数据分析'],
    conn: '很多你日常用的App——客服、写作助手、搜索——背后已经悄悄接入了AI，这就是<strong>2B落地</strong>的样子'
  }
];

const connectors = [
  { label: '训练输出 ↓', ctop: '#a78bfa', cbot: '#e8a838' },
  { label: '暴露接口 ↓', ctop: '#e8a838', cbot: '#5b8dee' },
  { label: '包装界面 ↓', ctop: '#5b8dee', cbot: '#52d48f' },
  { label: '能力升级 ↓', ctop: '#52d48f', cbot: '#f97316' },
  { label: '面向用户 ↓', ctop: '#f97316', cbot: '#ec4899' },
];

const glossary = [
  { term: 'Token', def: 'AI处理文字的最小单位，大约0.75个英文单词' },
  { term: 'Prompt', def: '你给AI的输入指令，"提示词"' },
  { term: 'Fine-tune', def: '在基础模型上针对特定任务再训练' },
  { term: 'Context', def: 'AI一次能"看到"的全部文字长度' },
  { term: 'RAG', def: '让AI先查资料再回答，接入外部知识库' },
  { term: 'Hallucination', def: 'AI一本正经编造不存在的内容' },
  { term: '开源模型', def: '权重文件公开，可本地运行，如LLaMA' },
  { term: 'Inference', def: '模型实际运行生成回答的过程' },
];

const glossaryDefs = {
  'Token': 'AI不按"字"或"词"处理文字，而是按Token——大约0.75个英文单词，或1-2个中文字。你发出的文字和AI的回答都要消耗Token，API按Token数量计费。一本小说大概是10万Token。',
  'Prompt': '你给AI输入的内容，也叫"提示词"。Prompt的质量极大影响回答质量——这就是为什么有专门的"提示工程"职业。好的Prompt = 给AI清晰的任务说明 + 必要背景 + 期望格式。',
  'Fine-tune': '在一个通用大模型基础上，用特定领域数据再次训练，让它在这个领域表现更好。比如用医学文献Fine-tune出一个医疗AI，用法律文书Fine-tune出法律AI。',
  'Context': 'AI每次对话能"看到"的全部文字数量，单位是Token。Context越长，AI记得越多。早期只有4K Token（约3000字），现在有些模型支持100万Token（一整个图书馆）。超出就"失忆"了。',
  'RAG': 'Retrieval-Augmented Generation，检索增强生成。让AI先从知识库里搜索相关内容，再结合这些内容回答。解决了AI知识截止日期的问题，让AI能回答实时或私有数据。',
  'Hallucination': 'AI最著名的问题：它会用极其自信的语气编造根本不存在的"事实"——假引用、假数据、假人名。这不是"说谎"，是预测机制的副作用。用AI做重要决策前必须核实信息。',
  '开源模型': '权重文件完全公开，任何人可以下载、本地运行、修改、再分发。Meta的LLaMA系列是代表。好处是隐私安全、可离线；缺点是需要硬件，性能一般弱于闭源顶级模型。',
  'Inference': 'AI"思考"并生成回答的过程。训练（Training）是让AI学习，Inference是让AI实际工作。普通用户每次对话都是在做Inference。GPU主要用于这两个过程。',
};

// Build stack
const stackEl = document.getElementById('stack');
layers.forEach((layer, i) => {
  if (i > 0) {
    const c = connectors[i-1];
    const conn = document.createElement('div');
    conn.className = 'connector';
    conn.style.animationDelay = `${0.3 + i * 0.12}s`;
    conn.innerHTML = `
      <div class="connector-line" style="--c-top:${c.ctop};--c-bot:${c.cbot};background:linear-gradient(to bottom,${c.ctop},${c.cbot})"></div>
      <span class="connector-label">${c.label}</span>
    `;
    stackEl.appendChild(conn);
  }

  const card = document.createElement('div');
  card.className = 'layer-card';
  card.style.setProperty('--card-color', layer.color);
  card.style.setProperty('--card-bg', layer.bg);
  card.style.animationDelay = `${0.35 + i * 0.12}s`;

  const whatFormatted = layer.what.replace(/\n\n/g, '</p><p style="margin-top:8px">');

  card.innerHTML = `
    <div class="layer-header">
      <div class="layer-icon">${layer.icon}</div>
      <div class="layer-meta">
        <div class="layer-tag">${layer.tag}</div>
        <div class="layer-title">${layer.title}</div>
        <div class="layer-subtitle">${layer.subtitle}</div>
      </div>
      <div class="layer-chevron">▼</div>
    </div>
    <div class="layer-body">
      <div class="layer-body-inner">
        <div class="section-label">本质是什么</div>
        <div class="section-text"><p>${whatFormatted}</p></div>
        <div class="analogy-box">
          <div class="section-label">类比</div>
          <div class="section-text">${layer.analogy}</div>
        </div>
        <div class="section-label" style="margin-top:14px">相关词</div>
        <div class="tags-row">${layer.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
        <div class="conn-note" style="margin-top:12px">🔗 ${layer.conn}</div>
      </div>
    </div>
  `;

  card.addEventListener('click', () => {
    const body = card.querySelector('.layer-body');
    const isOpen = body.classList.contains('open');
    // close all
    document.querySelectorAll('.layer-body.open').forEach(b => b.classList.remove('open'));
    document.querySelectorAll('.layer-card.active').forEach(c => c.classList.remove('active'));
    if (!isOpen) {
      body.classList.add('open');
      card.classList.add('active');
    }
  });

  stackEl.appendChild(card);
});

// Build glossary
const grid = document.getElementById('glossary-grid');
glossary.forEach(g => {
  const el = document.createElement('div');
  el.className = 'gitem';
  el.innerHTML = `<div class="gitem-term">${g.term}</div><div class="gitem-def">${g.def}</div>`;
  el.addEventListener('click', () => showModal(g.term, glossaryDefs[g.term]));
  grid.appendChild(el);
});

function showModal(term, body) {
  document.getElementById('modal-term').textContent = term;
  document.getElementById('modal-body').textContent = body;
  document.getElementById('modal').classList.add('show');
}
function closeModal(e) {
  if (!e || e.target === document.getElementById('modal')) {
    document.getElementById('modal').classList.remove('show');
  }
}
</script>
</body>
</html>
